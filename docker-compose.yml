version: "3.8"

services:
  # ---------- Infrastructure ----------
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shopii
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shopii_dev}
      POSTGRES_DB: shopii
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopii"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------- API ----------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: "0.0.0.0"
      DATABASE_URL: postgresql://shopii:${POSTGRES_PASSWORD:-shopii_dev}@postgres:5432/shopii
      REDIS_URL: redis://redis:6379
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CX: ${GOOGLE_CX:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      CHROME_EXTENSION_ID: ${CHROME_EXTENSION_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---------- Scraper ----------
  scraper-worker:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    command: celery -A src.worker worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://shopii:${POSTGRES_PASSWORD:-shopii_dev}@postgres:5432/shopii
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scraper-beat:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    command: celery -A src.worker beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://shopii:${POSTGRES_PASSWORD:-shopii_dev}@postgres:5432/shopii
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      scraper-worker:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
