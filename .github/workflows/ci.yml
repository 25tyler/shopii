name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- API ----------
  api-lint-typecheck:
    name: "API: Lint & Typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx prisma generate --schema=prisma/schema.dev.prisma
      - run: npm run typecheck

  api-test:
    name: "API: Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx prisma generate --schema=prisma/schema.dev.prisma
      - run: npm run test:run

  api-build:
    name: "API: Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx prisma generate --schema=prisma/schema.prisma
      - run: npm run build

  api-docker:
    name: "API: Docker Build"
    runs-on: ubuntu-latest
    needs: [api-lint-typecheck, api-test, api-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Extension ----------
  extension-build:
    name: "Extension: Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm run build

  # ---------- Scraper ----------
  scraper-docker:
    name: "Scraper: Docker Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./scraper
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
